name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/constraints.txt
      - name: Install audio runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes ffmpeg libsndfile1
      - name: Install constrained dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --constraint backend/constraints.txt --editable "backend[dev]"
          python -m pip check
      - name: Run backend tests
        run: python -m pytest backend/tests -v

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install locked dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --run
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  macos-wrapper:
    name: macOS wrapper
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create the repo-backed runtime marker
        run: python -m venv .venv
      - name: Check scripts and plist
        run: |
          /bin/zsh -n scripts/build-macos-app.sh scripts/run-macos-server.sh scripts/verify-macos-app.sh
          python -m py_compile scripts/run_macos_server.py
          plutil -lint macos/Info.plist
          test "$(plutil -extract LSMinimumSystemVersion raw macos/Info.plist)" = "13.0"
      - name: Check Objective-C syntax
        run: |
          clang -fsyntax-only -fobjc-arc -fmodules \
            -fmodules-cache-path="$RUNNER_TEMP/cochl-clang-module-cache" \
            -mmacosx-version-min=13.0 \
            macos/CochlSenseCloudLiveDemoApp.m
      - name: Clean-build universal2 wrapper
        env:
          COCHL_MACOS_ARCHS: arm64 x86_64
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: scripts/build-macos-app.sh --clean
      - name: Verify bundle architecture and deployment target
        env:
          COCHL_EXPECTED_MACOS_ARCHS: arm64 x86_64
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: scripts/verify-macos-app.sh
